<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: rgb(49, 51, 63);
    background: transparent;
  }
  body { padding: 4px 0; }
  .buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  button {
    background: #fff;
    border: 1px solid #d0d7de;
    color: rgb(49, 51, 63);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  button:hover { background: #f3f4f6; }
  button:active { background: #e5e7eb; }
</style>
</head>
<body>
  <div class="buttons">
    <button data-preset="explain_simply">Explain simply</button>
    <button data-preset="define_terms">Define terms</button>
    <button data-preset="why_matters">Why does this matter?</button>
    <button data-preset="give_example">Give an example</button>
  </div>

<script>
  const SET_VALUE = "streamlit:setComponentValue";
  const SET_HEIGHT = "streamlit:setFrameHeight";
  const READY = "streamlit:componentReady";

  function send(type, data) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data || {}), "*");
  }
  function setHeight() {
    send(SET_HEIGHT, { height: document.documentElement.scrollHeight });
  }
  function setValue(value) {
    send(SET_VALUE, { value, dataType: "json" });
  }

  function readSelection() {
    try { return localStorage.getItem("pex_selection") || ""; } catch (e) { return ""; }
  }

  document.querySelectorAll("button[data-preset]").forEach((btn) => {
    btn.addEventListener("click", () => {
      setValue({
        preset: btn.dataset.preset,
        selection: readSelection(),
        nonce: Date.now() + Math.random(),
      });
    });
  });

  // Respond to every render ping from Streamlit so the iframe height tracks
  // the button bar's layout reliably.
  window.addEventListener("message", (event) => {
    const data = event.data;
    if (data && data.type === "streamlit:render") setHeight();
  });
  window.addEventListener("load", setHeight);
  window.addEventListener("resize", setHeight);

  send(READY, { apiVersion: 1 });
  requestAnimationFrame(setHeight);
</script>
</body>
</html>
